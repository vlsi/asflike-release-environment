services:
  svn:
    container_name: svn-server
    env_file:
      - .env
    build:
      context: ./svn-server
      args:
        - SVN_NAME
        - EXTRA_SVN_DIRS
    ports:
      - 80:80
      - 3960:3960
  git:
    container_name: git-server
    env_file:
      - .env
    build:
      context: ./git-server
      args:
        - GIT_NAME
    ports:
      - 9418:9418
  nexus:
    container_name: nexus-stub
    env_file:
      - .env
    image: vlsi/nexus-stub:v2
    environment:
      GROUP_IDS: $NEXUS_GROUP
    ports:
      - 8080:8080
  sonar:
    profiles:
      - sonar
    container_name: sonarqube
    image: sonarqube:community
    ports:
      - 9000:9000
